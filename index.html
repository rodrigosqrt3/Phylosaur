    // DIFFICULTY SELECTION SCREEN
    // ═══════════════════════════════════════════════════════════════════════        
        async function startPracticeChallenge(difficulty) {
            setHeaderControls('practice');
          selectedDifficulty = difficulty;

        async function loadPracticeDatabase(difficulty) {
          isPracticeMode = true;
          
          const wrapper = document.getElementById('tree-scroll-wrapper');
          if (wrapper) wrapper.innerHTML = '<div class="loading">Loading practice challenge...</div>';
          
          try {
            const res = await fetch('phylosaur_db.json');
            if (!res.ok) throw new Error('Failed to load database');
            
            fullDatabase = await res.json();
            database = fullDatabase.filter(d => d.dificuldade === difficulty);
            
            console.log(`Loaded ${database.length} specimens for practice mode (${difficulty})`);
            
            if (database.length === 0) {
              throw new Error(`No specimens found for difficulty: ${difficulty}`);
            }
            
            const randomIndex = Math.floor(Math.random() * database.length);
            targetDino = database[randomIndex];
            guesses = [];
            hintsRemaining = 3;
            isGiveUpMode = false;
            gameWon = false;
            guessedNames = new Set();
            revealedClades = new Set();
            hintHistory = [];
            guessesSinceLastHint = 0;
            
            console.log('Practice specimen:', targetDino.nome);
            
            document.getElementById('attempts').textContent = '0';
            document.getElementById('hints').textContent = '3';
            document.getElementById('best-match').textContent = '0';
            document.getElementById('clades-revealed').textContent = '0';
            
            if (wrapper) {
              wrapper.innerHTML = '<div class="empty-state">The phylogenetic tree will progressively reveal as you explore the evolutionary landscape through your classification attempts.</div>';
            }

            initializeAutocomplete();
            
          } catch (err) {
            console.error('Database error:', err);
            if (wrapper) {
              wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading challenge</strong><br>${err.message}</div>`;
            }
          }
        }

        function getCurrentDateFormatted() {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return today.toLocaleDateString('en-US', options);
        }

        function startCountdown() {
            function update() {
                const timer = document.getElementById('countdown-timer');
                if (!timer) return; // user navigated away, stop

                const now = new Date();
                const midnight = new Date();
                midnight.setHours(24, 0, 0, 0); // next midnight local time

                const diff = midnight - now;

                const h = String(Math.floor(diff / 1000 / 60 / 60)).padStart(2, '0');
                const m = String(Math.floor(diff / 1000 / 60) % 60).padStart(2, '0');
                const s = String(Math.floor(diff / 1000) % 60).padStart(2, '0');

                timer.textContent = `${h}:${m}:${s}`;

                setTimeout(update, 1000);
            }

            update();
            }

    async function loadCompletedChallengeTree(difficulty, result) {
      const wrapper = document.getElementById('tree-scroll-wrapper');
      
      try {
        const res = await fetch('phylosaur_db.json');
        if (!res.ok) throw new Error('Failed to load database');
        
        fullDatabase = await res.json();
        database = fullDatabase.filter(d => d.dificuldade === difficulty);
        
        const seed = getDailySeed(difficulty);
        const hash = hashString(seed);
        const index = hash % database.length;
        
        targetDino = database[index];
        
        if (targetDino.nome !== result.targetDino) {
          console.warn('Mismatch between saved and calculated target');
        }
        
        if (result.guesses && result.guesses.length > 0) {
          guesses = result.guesses.map(savedGuess => {
            const dino = database.find(d => d.nome === savedGuess.nome);
            if (!dino) {
              console.warn(`Dinosaur ${savedGuess.nome} not found in database`);
              return null;
            }
            
            const proximity = calculateProximity(dino, targetDino);
            return {
              dino: dino,
              proximity: proximity,
              isHint: savedGuess.isHint || false
            };
          }).filter(g => g !== null);
          
          revealedClades = new Set(result.revealedClades || []);
          hintHistory = result.hintHistory || [];
          
        } else {
          wrapper.innerHTML = `
            <div class="empty-state" style="padding:80px 40px;">
              <h3 style="color:#c9a96e; margin-bottom:20px; font-size:1.4em;">Challenge Completed</h3>
              <p style="color:#a68a5a; line-height:1.8; margin-bottom:15px;">
                This challenge was completed before the detailed save system was implemented.
              </p>
              <p style="color:#8b7355; font-size:0.95em; line-height:1.8;">
                The phylogenetic tree from this session is not available for review.
                Complete the challenge again to see the full tree visualization.
              </p>
              <button class="btn-new-game" onclick="showDifficultySelection()" 
                      style="margin-top:30px; width:auto; padding:14px 28px;">
                Return to Level Selection
              </button>
            </div>
          `;
          return;
        }
        
        gameWon = true;
        hintsRemaining = 0;
        guessedNames = new Set(guesses.map(g => g.dino.nome.toLowerCase()));
        
        renderEnhancedTree();
        updateCladeInfo();
        updateGuessHistory();
        
      } catch (err) {
        console.error('Error loading completed challenge:', err);
        if (wrapper) {
          wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading tree</strong><br>${err.message}</div>`;
        }
      }
    }

            <button class="btn-guess" onclick="makeGuess()">Submit</button>
            <button class="btn-hint" onclick="useHint()">Hint</button>
            <button class="btn-hint" onclick="giveUp()" 
                    style="opacity:0.6; font-size:12px; padding:10px 16px; letter-spacing:1px;">
            Give Up
            </button>
            <div id="suggestions"></div>
          </div>

          <div id="tree-container">
            <div id="tree-scroll-wrapper">
              <div class="empty-state">Loading classification challenge...</div>

    // ═══════════════════════════════════════════════════════════════════════
    // LOAD DATABASE
    // ═══════════════════════════════════════════════════════════════════════
    async function loadDailyDatabase(difficulty, forceClean = false) {
      const wrapper = document.getElementById('tree-scroll-wrapper');
      if (wrapper) wrapper.innerHTML = '<div class="loading">Loading classification database...</div>';
      
      try {
        const res = await fetch('phylosaur_db.json');
        if (!res.ok) throw new Error('Failed to load database');
        
        fullDatabase = await res.json();
        database = fullDatabase.filter(d => d.dificuldade === difficulty);
        
        console.log(`Loaded ${database.length} specimens for difficulty: ${difficulty}`);
        
        if (database.length === 0) {
          throw new Error(`No specimens found for difficulty: ${difficulty}`);
        }
        
        const seed = getDailySeed(difficulty);
        const hash = hashString(seed);
        const index = hash % database.length;
        
        targetDino = database[index];
        guesses = [];
        hintsRemaining = 3;
        isGiveUpMode = false;
        gameWon = false;
        guessedNames = new Set();
        revealedClades = new Set();
        hintHistory = [];
        guessesSinceLastHint = 0;
        
        console.log('Daily specimen:', targetDino.nome, 'Seed:', seed);
        
        const savedProgress = forceClean ? null : await loadGameProgress(difficulty);

        if (savedProgress && savedProgress.targetDino === targetDino.nome) {
          console.log('Loading saved progress...');
          
          // Reconstruir guesses
          if (savedProgress.guesses && savedProgress.guesses.length > 0) {
            guesses = savedProgress.guesses.map(savedGuess => {
              const dino = database.find(d => d.nome === savedGuess.nome);
              if (!dino) return null;
              
              const proximity = calculateProximity(dino, targetDino);
              
              if (proximity.lastCommonClade) {
                revealedClades.add(proximity.lastCommonClade);
              }
              
              return {
                dino: dino,
                proximity: proximity,
                isHint: savedGuess.isHint || false
              };
            }).filter(g => g !== null);
          }
          
          if (savedProgress.revealedClades) {
            savedProgress.revealedClades.forEach(c => revealedClades.add(c));
          }
          hintHistory = savedProgress.hintHistory || [];
          hintsRemaining = savedProgress.hintsRemaining !== undefined ? savedProgress.hintsRemaining : 3;
          guessedNames = new Set((savedProgress.guesses || []).map(g => g.nome.toLowerCase()));
          
          console.log(`Restored ${guesses.length} guesses, ${hintsRemaining} hints remaining`);
          
          setTimeout(() => {
            const bestMatch = guesses.length > 0 
              ? Math.max(...guesses.map(g => g.proximity.matches)) 
              : 0;
            
            document.getElementById('attempts').textContent = guesses.length;
            document.getElementById('hints').textContent = hintsRemaining;
            document.getElementById('best-match').textContent = bestMatch;
            document.getElementById('clades-revealed').textContent = revealedClades.size;
            
            renderEnhancedTree();
            updateCladeInfo();
            updateGuessHistory();
            document.getElementById('dino-input')?.focus();
          }, 100);
          
        } else {
          document.getElementById('attempts').textContent = '0';
          document.getElementById('hints').textContent = '3';
          document.getElementById('best-match').textContent = '0';
          document.getElementById('clades-revealed').textContent = '0';
          
          if (wrapper) {
            wrapper.innerHTML = '<div class="empty-state">The phylogenetic tree will progressively reveal as you explore the evolutionary landscape through your classification attempts.</div>';
          }
        }
        
        initializeAutocomplete();
        document.getElementById('dino-input')?.focus();

      } catch (err) {
        console.error('Database error:', err);
        if (wrapper) {
          wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading challenge</strong><br>${err.message}</div>`;
        }
      }
    }
    // ═══════════════════════════════════════════════════════════════════════
    // GAME LOGIC
    // ═══════════════════════════════════════════════════════════════════════
    function calculateProximity(guess, target) {
      let matches = 0;
      const minLength = Math.min(guess.linhagem.length, target.linhagem.length);
      
      for (let i = 0; i < minLength; i++) {
        if (guess.linhagem[i] === target.linhagem[i]) {
          matches++;
        } else {
          break;
        }
      }
      
      return {
        matches,
        percentage: Math.round((matches / target.linhagem.length) * 100),
        lastCommonClade: matches > 0 ? guess.linhagem[matches - 1] : null,
        divergenceDepth: matches
      };
    }

    function countPossibleSpecimens() {
        if (guesses.length === 0) return database.length;
        
        // Find the deepest revealed clade on the target's path
        const revealedOnPath = [];
        
        guesses.forEach(guess => {
            const mrca = findMRCA(guess.dino.linhagem, targetDino.linhagem);
            if (mrca) {
            const idx = targetDino.linhagem.indexOf(mrca.clade);
            targetDino.linhagem.slice(0, idx + 1).forEach(c => {
                if (!revealedOnPath.includes(c)) revealedOnPath.push(c);
            });
            }
        });

        revealedClades.forEach(clade => {
            const idx = targetDino.linhagem.indexOf(clade);
            if (idx !== -1) {
            targetDino.linhagem.slice(0, idx + 1).forEach(c => {
                if (!revealedOnPath.includes(c)) revealedOnPath.push(c);
            });
            }
        });

        if (revealedOnPath.length === 0) return database.length;

        // Count dinosaurs that have ALL revealed clades in their lineage
        return database.filter(d => 
            revealedOnPath.every(clade => d.linhagem.includes(clade))
        ).length;
        }

    async function makeGuess() {
      if (gameWon) return;
      
      const input = document.getElementById('dino-input');
      const guessName = input.value.trim();
      
      if (!guessName) {
        await customAlert('Input Required', 'Please enter a specimen name to classify.');
        return;
      }

      const guessDino = database.find(d => d.nome.toLowerCase() === guessName.toLowerCase());
      
      if (!guessDino) {
        await customAlert('Taxon Not Found', 'This specimen is not in the classification database. Please use the autocomplete suggestions.');
        return;
      }

      if (guessedNames.has(guessDino.nome.toLowerCase())) {
        await customAlert('Duplicate Classification', 'This specimen has already been classified in this session.');
        return;
      }
      
      guessedNames.add(guessDino.nome.toLowerCase());
      guessesSinceLastHint++; 

      const proximity = calculateProximity(guessDino, targetDino);
      
      if (proximity.lastCommonClade) {
        revealedClades.add(proximity.lastCommonClade);
      }
      
      guesses.push({ 
        dino: guessDino, 
        proximity, 
        isHint: false 
      });

      document.getElementById('attempts').textContent = guesses.length;
      document.getElementById('best-match').textContent = Math.max(...guesses.map(g => g.proximity.matches));
      document.getElementById('clades-revealed').textContent = revealedClades.size;
      document.getElementById('possible-specimens').textContent = countPossibleSpecimens();

      if (guessDino.nome === targetDino.nome) {
        gameWon = true;
        showVictory();
        input.value = '';
        document.getElementById('suggestions').style.display = 'none';
        return; 
      }
      renderEnhancedTree();
      updateCladeInfo();
      updateGuessHistory();

      input.value = '';
      document.getElementById('suggestions').style.display = 'none';

      if (currentUser && !gameWon && !isPracticeMode) {
        saveGameProgress(selectedDifficulty);
      }
    }

    async function useHint() {
      if (hintsRemaining <= 0) {
        await customAlert('No Hints Available', 'You have exhausted all hints for this challenge.');
        return;
      }
      
      if (gameWon) return;

        const requiredGuesses = 2;
        if (guessesSinceLastHint < requiredGuesses && guesses.length > 0) {
          await customAlert(
            'Hint Cooldown', 
            `You must make <strong>${requiredGuesses - guessesSinceLastHint}</strong> more classification attempt(s) before requesting another hint.`
          );
          return;
        }

      const dinosauriaIndex = targetDino.linhagem.indexOf('Dinosauria');
      let maxRevealedIndex = dinosauriaIndex;
      
      if (guesses.length > 0) {
        guesses.forEach(guess => {
          const guessDepth = guess.proximity.matches - 1;
          if (guessDepth > maxRevealedIndex) {
            maxRevealedIndex = guessDepth;
          }
        });
      }
      
      revealedClades.forEach(clade => {
        if (targetDino.linhagem.includes(clade)) {
          const cladeIndex = targetDino.linhagem.indexOf(clade);
          if (cladeIndex > maxRevealedIndex) {
            maxRevealedIndex = cladeIndex;
          }
        }
      });
      const nextCladeIndex = maxRevealedIndex + 1;
      if (nextCladeIndex >= targetDino.linhagem.length) {
        await customAlert('Lineage Complete', 'The complete phylogenetic path has been revealed. No additional hints available.');
        return;
      }

      hintsRemaining--;
      document.getElementById('hints').textContent = hintsRemaining;

      const revealClade = targetDino.linhagem[nextCladeIndex];
      
      await customAlert('Hint', `The next clade in the lineage is:<br><br><strong style="color:#d4b87e; font-size:1.2em;">${revealClade}</strong>`);

      revealedClades.add(revealClade);

      hintHistory.push({
        cladeName: revealClade,
        depth: nextCladeIndex + 1
      });
      
      document.getElementById('clades-revealed').textContent = revealedClades.size;
      document.getElementById('possible-specimens').textContent = countPossibleSpecimens();

      guessesSinceLastHint = 0;
      
      renderEnhancedTree();
      updateGuessHistory();
      await showCladeInfo(revealClade);

    if (currentUser && !isPracticeMode) {
    saveGameProgress(selectedDifficulty);
    }
  }

    async function giveUp() {
        if (gameWon) return;

        const confirm = await customConfirm(
            'Give Up?',
            `Are you sure you want to reveal the answer? This will count as a loss.`,
            'Give Up',
            'Keep Trying'
        );

        if (confirm !== 'true') return;

        gameWon = false;

        if (currentUser && !isPracticeMode) {
            await updateStatsAfterGame(false, guesses.length, selectedDifficulty);
            await sb.from('daily_results').upsert({
                user_id: currentUserId,
                played_date: getTodayString(),
                difficulty: selectedDifficulty,
                target_dino: targetDino.nome,
                guess_count: guesses.length,
                won: false,
                gave_up: true,
                guesses: guesses.map(g => ({ nome: g.dino.nome, isHint: g.isHint || false })),
                revealed_clades: Array.from(revealedClades),
                hint_history: hintHistory
            }, { onConflict: 'user_id,played_date,difficulty' });
        }

        document.getElementById('dino-input').disabled = true;
        document.querySelector('.btn-guess').disabled = true;
        document.querySelector('.btn-hint').disabled = true;
        document.querySelector('.btn-giveup')?.setAttribute('disabled', true);

        const imageUrl = await fetchWikimediaImage(targetDino.nome);
        const commonsPage = `https://commons.wikimedia.org/wiki/File:${encodeURIComponent(targetDino.nome + ' TD.png')}`;

        const container = document.getElementById('tree-container');
        const v = document.createElement('div');
        v.className = 'victory';
        v.style.background = 'linear-gradient(135deg, #3d2318 0%, #2c1a12 100%)';

        v.innerHTML = `
            <h2 style="color:#c06040;">BETTER LUCK TOMORROW</h2>
            <div class="victory-dino">${targetDino.nome}</div>
            <p style="font-size:0.95em; color:#8b7355; margin-top:8px; letter-spacing:1px;">
            ${guesses.length} ${guesses.length === 1 ? 'attempt' : 'attempts'} · gave up
            </p>

            ${imageUrl ? `
            <div style="max-width:440px; margin:24px auto 0;">
            <img src="${imageUrl}" alt="${targetDino.nome}" 
                style="width:100%; border:2px solid #5d4a36; 
                        border-radius:8px; display:block;
                        box-shadow:0 4px 16px rgba(0,0,0,0.5);
                        cursor:zoom-in;
                        transition:transform 0.2s, box-shadow 0.2s;"
                onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.7)'"
                onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.5)'"
                onclick="openImageLightbox('${imageUrl}', '${targetDino.nome}', '${commonsPage}')" />
            <div style="text-align:center; margin-top:8px; font-size:0.78em; color:#5d4a36; font-style:italic; letter-spacing:1px;">
                Art by <a href="https://totaldino.com" target="_blank" style="color:#8b7355; text-decoration:none;">TotalDino</a>
                · <a href="https://totaldino.com/dino/${targetDino.nome.toLowerCase()}" target="_blank" style="color:#8b7355; text-decoration:none;">View on TotalDino</a>
                · <a href="${commonsPage}" target="_blank" style="color:#8b7355; text-decoration:none;">Wikimedia Commons</a>
            </div>
            </div>` : ''}

            <button class="btn-new-game" onclick="${isPracticeMode ? 'showPracticeMode()' : 'showDifficultySelection()'}">
            ${isPracticeMode ? 'Practice Another' : 'Return to Level Selection'}
            </button>
        `;

        container.insertBefore(v, container.firstChild);
        isGiveUpMode = true;
        gameWon = true;
        renderEnhancedTree();
        updateCladeInfo();
        }

    // ═══════════════════════════════════════════════════════════════════════
    // VICTORY
    // ═══════════════════════════════════════════════════════════════════════

    async function showVictory() {
    if (currentUser && !isPracticeMode) {
        await clearGameProgress(selectedDifficulty);
    }

    let streakData = null;
    let milestone = null;

    if (currentUser && !isPracticeMode) {
        streakData = await updateStreak();
        milestone = checkStreakMilestone(streakData.current);
        await updateStatsAfterGame(true, guesses.length, selectedDifficulty);
        await markDailyChallengeCompleted(selectedDifficulty);
    }

    document.getElementById('dino-input').disabled = true;
    document.querySelector('.btn-guess').disabled = true;
    document.querySelector('.btn-hint').disabled = true;

    const container = document.getElementById('tree-container');
    const v = document.createElement('div');
    v.className = 'victory';

    let modeHTML = '';
    if (isPracticeMode) {
        modeHTML = `
        <div style="padding:15px; background:rgba(139,115,85,0.15); border-radius:6px; margin-bottom:20px; border:2px solid #8b7355;">
            <div style="color:#c9a96e; font-weight:600; letter-spacing:1px; font-size:0.95em;">
            Practice Mode — Statistics not recorded
            </div>
        </div>
        `;
    }

    let streakHTML = '';
    if (streakData && !isPracticeMode) {
        if (milestone) {
        streakHTML = `
            <div style="margin-top:25px; padding:25px; background:linear-gradient(135deg, rgba(255,149,0,0.2), rgba(255,69,0,0.2)); border-radius:8px; border:2px solid #ff9500;">
            <div style="font-size:2.2em; color:#ff9500; margin-bottom:12px;">◆ ${milestone} DAY MILESTONE! ◆</div>
            <div style="font-size:1.1em; color:#d4b87e; margin-bottom:8px;">Current Streak: ${streakData.current} days</div>
            <div style="font-size:0.9em; color:#a68a5a;">Best: ${streakData.best} days</div>
            </div>
        `;
        } else {
        streakHTML = `
            <div style="margin-top:25px; padding:20px; background:rgba(61,47,31,0.5); border-radius:8px; border:2px solid #8b7355;">
            <div style="font-size:1.8em; color:#ff9500; margin-bottom:8px;">◆ ${streakData.current} Day Streak</div>
            <div style="font-size:0.9em; color:#a68a5a;">Best: ${streakData.best} days</div>
            </div>
        `;
        }
    }

    const imageUrl = await fetchWikimediaImage(targetDino.nome);
    const commonsPage = `https://commons.wikimedia.org/wiki/File:${encodeURIComponent(targetDino.nome + ' TD.png')}`;
        v.innerHTML = `
            ${modeHTML}
            <h2>PHYLOGENETIC CLASSIFICATION COMPLETE</h2>
            <div class="victory-dino">${targetDino.nome}</div>
            <p style="font-size:0.95em; color:#8b7355; margin-top:8px; letter-spacing:1px;">
            ${guesses.length} ${guesses.length === 1 ? 'attempt' : 'attempts'} · ${revealedClades.size} ${revealedClades.size === 1 ? 'clade' : 'clades'} revealed
            </p>

            ${imageUrl ? `
            <div style="max-width:440px; margin:24px auto 0;">
            <img src="${imageUrl}" alt="${targetDino.nome}" 
                style="width:100%; border:2px solid #5d4a36; 
                        border-radius:8px; display:block;
                        box-shadow:0 4px 16px rgba(0,0,0,0.5);
                        cursor:zoom-in;
                        transition:transform 0.2s, box-shadow 0.2s;"
                onmouseover="this.style.transform='scale(1.02)'; this.style.boxShadow='0 8px 24px rgba(0,0,0,0.7)'"
                onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='0 4px 16px rgba(0,0,0,0.5)'"
                onclick="openImageLightbox('${imageUrl}', '${targetDino.nome}', '${commonsPage}')" />
            <div style="text-align:center; margin-top:8px; font-size:0.78em; color:#5d4a36; font-style:italic; letter-spacing:1px;">
                Art by <a href="https://totaldino.com" target="_blank" style="color:#8b7355; text-decoration:none;">TotalDino</a>
                · <a href="https://totaldino.com/dino/${targetDino.nome.toLowerCase()}" target="_blank" style="color:#8b7355; text-decoration:none;">View on TotalDino</a>
                · <a href="${commonsPage}" target="_blank" style="color:#8b7355; text-decoration:none;">Wikimedia Commons</a>
            </div>
            </div>` : ''}

            ${streakHTML}

            <button class="btn-hint" onclick="shareResult()" id="share-btn" 
                    style="width:100%; padding:15px; font-size:14px; letter-spacing:2px; margin-top:24px; margin-bottom:12px;">
            Share Result
            </button>
            <button class="btn-new-game" onclick="${isPracticeMode ? 'showPracticeMode()' : 'showDifficultySelection()'}">
            ${isPracticeMode ? 'Practice Another' : 'Return to Level Selection'}
            </button>
        `;

    container.insertBefore(v, container.firstChild);
    renderEnhancedTree();
    updateCladeInfo();
    }

    function shareResult() {
    const diffNames = {
        'muito_facil': 'Level I',
        'facil':       'Level II',
        'normal':      'Level III',
        'dificil':     'Level IV',
        'muito_dificil': 'Level V'
    };

    const blocks = guesses.map(g => {
        const pct = g.proximity.percentage;
        if (pct === 100)  return '🟩'; 
        if (pct >= 75)    return '🟨'; 
        if (pct >= 50)    return '🟧'; 
        if (pct >= 25)    return '🟥'; 
        return '⬛';                   
    });

    const rows = [];
    for (let i = 0; i < blocks.length; i += 8) {
        rows.push(blocks.slice(i, i + 8).join(''));
    }

    const today = getCurrentDateFormatted();
    const diff  = diffNames[selectedDifficulty] || '';
    const mode  = isPracticeMode ? ' (Practice)' : '';

    const text = [
        `Phylosaur — ${diff}${mode}`,
        `${today}`,
        ``,
        rows.join('\n'),
        ``,
        `${guesses.length} attempts • ${revealedClades.size} clades revealed`,
        ``,
        `https://rodrigosqrt3.github.io/Phylosaur/`
    ].join('\n');

    if (navigator.share) {
        navigator.share({ text }).catch(() => {});
    } else {
        navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('share-btn');
        if (!btn) return;
        const original = btn.textContent;
        btn.textContent = 'Copied to clipboard!';
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = original;
            btn.disabled = false;
        }, 2000);
        }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);

        const btn = document.getElementById('share-btn');
        if (btn) {
            btn.textContent = 'Copied!';
            btn.disabled = true;
            setTimeout(() => {
            btn.textContent = 'Share Result';
            btn.disabled = false;
            }, 2000);
        }
        });
    }
    }

    // ═══════════════════════════════════════════════════════════════════════
    // WIKIPEDIA INFO PANEL
    // ═══════════════════════════════════════════════════════════════════════
    async function showCladeInfo(cladeName) {
      const infoDiv = document.getElementById('clade-info');
      infoDiv.innerHTML = `
        <div class="clade-info">
          <div class="loading">Retrieving phylogenetic information for ${cladeName}…</div>
        </div>
      `;

      const wikiInfo = await fetchWikipediaInfo(cladeName);
      
      if (!wikiInfo) {
        infoDiv.innerHTML = `
          <div class="clade-info">
            <h3>Clade: ${cladeName}</h3>
            <p style="color:#999;font-style:italic;">No encyclopedia entry found.</p>
          </div>
        `;
        return;
      }

      let html = `<div class="clade-info"><h3>Clade: ${cladeName}</h3><div class="clade-content">`;
      
      if (wikiInfo.image) {
        html += `<img src="${wikiInfo.image}" alt="${wikiInfo.title}" class="clade-image" />`;
      }
      
      html += `
        <div class="clade-text">
          ${wikiInfo.description 
            ? `<p>${wikiInfo.description}</p>` 
            : '<p style="color:#999;font-style:italic;">Description unavailable.</p>'
          }
          <a href="${wikiInfo.url}" target="_blank" class="clade-link">View Encyclopedia Entry</a>
        </div>
      `;
      
      html += `</div></div>`;
      infoDiv.innerHTML = html;
    }

    async function updateCladeInfo() {
      const infoDiv = document.getElementById('clade-info');
      
      if (guesses.length === 0) {
        infoDiv.innerHTML = '';
        return;
      }

      const bestGuess = guesses.reduce((b, c) => 
        c.proximity.matches > b.proximity.matches ? c : b
      );
      
      const lastCommonClade = bestGuess.proximity.lastCommonClade;
      
      if (!lastCommonClade) {
        infoDiv.innerHTML = '';
        return;
      }

      infoDiv.innerHTML = `
        <div class="clade-info">
          <div class="loading">Retrieving phylogenetic information for ${lastCommonClade}…</div>
        </div>
      `;

      const wikiInfo = await fetchWikipediaInfo(lastCommonClade);
      
      if (!wikiInfo) {
        infoDiv.innerHTML = `
          <div class="clade-info">
            <h3>Most Recent Common Ancestor: ${lastCommonClade}</h3>
            <p style="color:#999;font-style:italic;">No encyclopedia entry found.</p>
          </div>
        `;
        return;
      }

      let html = `
        <div class="clade-info">
          <h3>Most Recent Common Ancestor: ${lastCommonClade}</h3>
          <div class="clade-content">
      `;
      
      if (wikiInfo.image) {
        html += `<img src="${wikiInfo.image}" alt="${wikiInfo.title}" class="clade-image" />`;
      }
      
      html += `
        <div class="clade-text">
          ${wikiInfo.description 
            ? `<p>${wikiInfo.description}</p>` 
            : '<p style="color:#999;font-style:italic;">Description unavailable.</p>'
          }
          <a href="${wikiInfo.url}" target="_blank" class="clade-link">View Encyclopedia Entry</a>
        </div>
      `;
      
      html += `</div>`;

      html += `<div class="phylo-path"><h4>Revealed Phylogenetic Path to Mystery Taxon:</h4>`;
      for (let i = 0; i < bestGuess.proximity.matches; i++) {
        html += `
          <div class="phylo-step">
            <span class="phylo-step-name">${targetDino.linhagem[i]}</span>
          </div>
        `;
      }
      html += `</div></div>`;
      
      infoDiv.innerHTML = html;
    }
  </script>
</body>
