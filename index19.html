    function setHeaderControls(screen) {
    const controls = document.getElementById('header-controls');
    if (!controls) return;

    const themeBtn = `
      <button class="btn-hint btn-header" onclick="toggleTheme()" id="theme-toggle">
        <span id="theme-icon">${currentTheme === 'light' ? '🌙' : '☀️'}</span>
      </button>
    `;

    const aboutBtn = `<button class="btn-hint btn-header" onclick="showAbout()" style="padding:8px 14px; font-size:12px;">About</button>`;
    
    const statsBtn = currentUser 
      ? `<button class="btn-hint btn-header" onclick="showStatsDashboard()">Stats</button>` 
      : '';

    const logoutBtn = currentUser 
      ? `<button class="btn-hint btn-header" onclick="logout()">${currentUser}</button>` 
      : '';

    const backBtn = `<button class="btn-hint" onclick="showDifficultySelection()" style="padding:8px 14px; font-size:12px;">← Levels</button>`;

    const map = {
      'login':        themeBtn,
      'difficulty': themeBtn + aboutBtn + (currentUser ? statsBtn + logoutBtn : `<button class="btn-hint btn-header" onclick="showLoginModal()">Sign In</button>`),
      'game': themeBtn + aboutBtn + backBtn + (currentUser ? statsBtn : `<button class="btn-hint btn-header" onclick="showLoginModal()">Sign In</button>`),
      'stats':        themeBtn + `<button class="btn-hint btn-header" onclick="showDifficultySelection()">← Back</button>`,
      'about':        themeBtn + `<button class="btn-hint btn-header" onclick="showDifficultySelection()">← Back</button>`,
      'practice-menu':themeBtn + aboutBtn + `<button class="btn-hint btn-header" onclick="showDifficultySelection()">← Back</button>`,
      'practice':     themeBtn + aboutBtn + `<button class="btn-hint btn-header" onclick="showPracticeMode()">← Back</button>`,
    };

    controls.innerHTML = map[screen] || themeBtn;
    }

    function toggleTheme() {
    currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.body.classList.toggle('light-mode');
    
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = currentTheme === 'light' ? '🌙' : '☀️';
    
    localStorage.setItem('phylosaur-theme', currentTheme);
    }

    // ═══════════════════════════════════════════════════════════════════════
    // CUSTOM MODALS
    // ═══════════════════════════════════════════════════════════════════════
    function showModal(options) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        
        const box = document.createElement('div');
        box.className = 'modal-box';
        
        let html = '';
        
        if (options.title) {
          html += `<div class="modal-title">${options.title}</div>`;
        }
        
        if (options.message) {
          html += `<div class="modal-message">${options.message}</div>`;
        }
        
        if (options.info) {
          html += '<div class="modal-info">';
          options.info.forEach(item => {
            html += `
              <div class="modal-info-item">
                <span class="modal-info-label">${item.label}:</span>
                <span>${item.value}</span>
              </div>
            `;
          });
          html += '</div>';
        }
        
        html += '<div class="modal-buttons">';
        
        if (options.buttons) {
          options.buttons.forEach((btn, index) => {
            const btnClass = btn.primary ? 'modal-btn-primary' : 'modal-btn-secondary';
            html += `<button class="modal-btn ${btnClass}" data-result="${btn.value}">${btn.text}</button>`;
          });
        } else {
          html += '<button class="modal-btn modal-btn-primary" data-result="ok">OK</button>';
        }
        
        html += '</div>';
        
        box.innerHTML = html;
        overlay.appendChild(box);
        document.body.appendChild(overlay);
        
        box.querySelectorAll('.modal-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const result = btn.getAttribute('data-result');
            document.body.removeChild(overlay);
            resolve(result);
          });
        });
        
        overlay.addEventListener('click', (e) => {
          if (e.target === overlay && options.closeOnOverlay !== false) {
            document.body.removeChild(overlay);
            resolve(null);
          }
        });
      });
    }

    function customAlert(title, message) {
      return showModal({
        title: title,
        message: message,
        buttons: [{ text: 'OK', value: 'ok', primary: true }]
      });
    }

    function customConfirm(title, message, yesText = 'Yes', noText = 'No') {
      return showModal({
        title: title,
        message: message,
        buttons: [
          { text: yesText, value: true, primary: true },
          { text: noText, value: false, primary: false }
        ]
      });
}

    document.addEventListener('DOMContentLoaded', async function() {
    const savedTheme = localStorage.getItem('phylosaur-theme');
    if (savedTheme === 'light') toggleTheme();

    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', ''));

    if (params.get('error')) {
        await initializeUserSystem();
        showDifficultySelection();
        setTimeout(() => {
        showLoginModal();
        setTimeout(() => {
            const el = document.getElementById('signin-global-error');
            if (el) {
            el.textContent = 'Your reset link has expired. Please request a new one.';
            el.classList.add('visible');
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        }, 100);
        }, 100);
        return;
    }

    if (params.get('type') === 'recovery') {
        await initializeUserSystem();
        showPasswordUpdateForm();
        window.history.replaceState({}, document.title, window.location.pathname);
        return;
    }

    await initializeUserSystem();
    showDifficultySelection();
    });

        async function loadPracticeDatabase(difficulty) {
          isPracticeMode = true;
          
          const wrapper = document.getElementById('tree-scroll-wrapper');
          if (wrapper) wrapper.innerHTML = '<div class="loading">Loading practice challenge...</div>';
          
          try {
            const res = await fetch('phylosaur_db.json');
            if (!res.ok) throw new Error('Failed to load database');
            
            fullDatabase = await res.json();
            database = fullDatabase.filter(d => d.dificuldade === difficulty);
            
            console.log(`Loaded ${database.length} specimens for practice mode (${difficulty})`);
            
            if (database.length === 0) {
              throw new Error(`No specimens found for difficulty: ${difficulty}`);
            }
            
            const randomIndex = Math.floor(Math.random() * database.length);
            targetDino = database[randomIndex];
            guesses = [];
            hintsRemaining = 3;
            isGiveUpMode = false;
            gameWon = false;
            guessedNames = new Set();
            revealedClades = new Set();
            hintHistory = [];
            guessesSinceLastHint = 0;
            
            console.log('Practice specimen:', targetDino.nome);
            
            document.getElementById('attempts').textContent = '0';
            document.getElementById('hints').textContent = '3';
            document.getElementById('best-match').textContent = '0';
            document.getElementById('clades-revealed').textContent = '0';
            
            if (wrapper) {
              wrapper.innerHTML = '<div class="empty-state">The phylogenetic tree will progressively reveal as you explore the evolutionary landscape through your classification attempts.</div>';
            }

            initializeAutocomplete();
            
          } catch (err) {
            console.error('Database error:', err);
            if (wrapper) {
              wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading challenge</strong><br>${err.message}</div>`;
            }
          }
        }

        function getCurrentDateFormatted() {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return today.toLocaleDateString('en-US', options);
        }

        function startCountdown() {
            function update() {
                const timer = document.getElementById('countdown-timer');
                if (!timer) return; // user navigated away, stop

                const now = new Date();
                const midnight = new Date();
                midnight.setHours(24, 0, 0, 0); // next midnight local time

                const diff = midnight - now;

                const h = String(Math.floor(diff / 1000 / 60 / 60)).padStart(2, '0');
                const m = String(Math.floor(diff / 1000 / 60) % 60).padStart(2, '0');
                const s = String(Math.floor(diff / 1000) % 60).padStart(2, '0');

                timer.textContent = `${h}:${m}:${s}`;

                setTimeout(update, 1000);
            }

            update();
            }

    async function getDailyCompletionStatus() {
      if (!currentUserId) return { muito_facil: false, facil: false, normal: false, dificil: false, muito_dificil: false };
      
      const today = getTodayString();
      const { data } = await sb.from('daily_results')
        .select('difficulty')
        .eq('user_id', currentUserId)
        .eq('played_date', today)
        .eq('won', true);
      
      const status = { muito_facil: false, facil: false, normal: false, dificil: false, muito_dificil: false };
      if (data) data.forEach(row => { status[row.difficulty] = true; });
      return status;
    }  

    function getTodayString() {
      const today = new Date();
      return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
    }





    async function loadCompletedChallengeTree(difficulty, result) {
      const wrapper = document.getElementById('tree-scroll-wrapper');
      
      try {
        const res = await fetch('phylosaur_db.json');
        if (!res.ok) throw new Error('Failed to load database');
        
        fullDatabase = await res.json();
        database = fullDatabase.filter(d => d.dificuldade === difficulty);
        
        const seed = getDailySeed(difficulty);
        const hash = hashString(seed);
        const index = hash % database.length;
        
        targetDino = database[index];
        
        if (targetDino.nome !== result.targetDino) {
          console.warn('Mismatch between saved and calculated target');
        }
        
        if (result.guesses && result.guesses.length > 0) {
          guesses = result.guesses.map(savedGuess => {
            const dino = database.find(d => d.nome === savedGuess.nome);
            if (!dino) {
              console.warn(`Dinosaur ${savedGuess.nome} not found in database`);
              return null;
            }
            
            const proximity = calculateProximity(dino, targetDino);
            return {
              dino: dino,
              proximity: proximity,
              isHint: savedGuess.isHint || false
            };
          }).filter(g => g !== null);
          
          revealedClades = new Set(result.revealedClades || []);
          hintHistory = result.hintHistory || [];
          
        } else {
          wrapper.innerHTML = `
            <div class="empty-state" style="padding:80px 40px;">
              <h3 style="color:#c9a96e; margin-bottom:20px; font-size:1.4em;">Challenge Completed</h3>
              <p style="color:#a68a5a; line-height:1.8; margin-bottom:15px;">
                This challenge was completed before the detailed save system was implemented.
              </p>
              <p style="color:#8b7355; font-size:0.95em; line-height:1.8;">
                The phylogenetic tree from this session is not available for review.
                Complete the challenge again to see the full tree visualization.
              </p>
              <button class="btn-new-game" onclick="showDifficultySelection()" 
                      style="margin-top:30px; width:auto; padding:14px 28px;">
                Return to Level Selection
              </button>
            </div>
          `;
          return;
        }
        
        gameWon = true;
        hintsRemaining = 0;
        guessedNames = new Set(guesses.map(g => g.dino.nome.toLowerCase()));
        
        renderEnhancedTree();
        updateCladeInfo();
        updateGuessHistory();
        
      } catch (err) {
        console.error('Error loading completed challenge:', err);
        if (wrapper) {
          wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading tree</strong><br>${err.message}</div>`;
        }
      }
    }

    function showCompletedChallenge(difficulty, result) {
        setHeaderControls('game');
      selectedDifficulty = difficulty;
      const appContent = document.getElementById('app-content');
      
      appContent.innerHTML = `


        <div class="game-card">
            <div class="challenge-completed-banner" style="${result.gaveUp ? 'background:rgba(139,58,42,0.2); border-color:#8b3a2a;' : ''}">

                <div class="dino-name">${result.targetDino}</div>
                <div class="attempts">${result.gaveUp ? `After ${result.guessCount} attempts` : `Classified in ${result.guessCount} attempts`}</div>
            </div>
          </div>

          <div id="tree-container">
            <div id="tree-scroll-wrapper">
              <div class="loading">Loading phylogenetic tree...</div>
            </div>
          </div>

          <div id="clade-info"></div>
        </div>
      `;
      loadCompletedChallengeTree(difficulty, result);
    }

    function generateDifficultyButton(difficulty, name, level, description, completed) {
    const tierCount = {'muito_facil': 1, 'facil': 2, 'normal': 3, 'dificil': 4, 'muito_dificil': 5}[difficulty];
    let tiers = '';
    for (let i = 1; i <= 5; i++) {
        tiers += `<span class="tier-indicator ${i <= tierCount ? 'filled' : ''}"></span>`;
    }
    
    const statusIndicator = completed 
        ? '<div style="position:absolute; top:10px; right:10px; width:24px; height:24px; background:#5a9c6b; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; font-weight:bold;">✓</div>'
        : '';
    
    const borderClass = completed ? 'difficulty-completed' : '';
    
    return `
        <button class="difficulty-btn difficulty-${DIFFICULTY_MAP[difficulty]} ${borderClass}" 
                onclick="startDailyChallenge('${difficulty}')" 
                style="padding:30px; font-size:1.2em; position:relative;">
        ${statusIndicator}
        <div style="font-weight:bold; margin-bottom:10px; font-size:1.3em; letter-spacing:3px;">
            ${name}
        </div>
        <div style="margin:8px 0;">
            ${tiers}
        </div>
        ${description ? `<div style="font-size:0.75em; color:#8b7355; font-style:italic;">${description}</div>` : ''}
        </button>
    `;
    }

    // START GAME

    async function startDailyChallenge(difficulty) {
      setHeaderControls('game');
      isPracticeMode = false;
      const today = getTodayString();
      let existingResult = null;

      if (currentUserId) {
        const { data } = await sb.from('daily_results')
          .select('*')
          .eq('user_id', currentUserId)
          .eq('played_date', today)
          .eq('difficulty', difficulty)
          .single();
        existingResult = data;
      }

        if (existingResult && (existingResult.won || existingResult.gave_up)) {
            showCompletedChallenge(difficulty, {
                targetDino: existingResult.target_dino,
                guessCount: existingResult.guess_count,
                guesses: existingResult.guesses,
                revealedClades: existingResult.revealed_clades,
                hintHistory: existingResult.hint_history,
                gaveUp: existingResult.gave_up || false
            });
            return;
        }
      
      selectedDifficulty = difficulty;
      const appContent = document.getElementById('app-content');
      
      appContent.innerHTML = `
        <div class="game-card">
          <div class="stats" style="grid-template-columns: repeat(5, 1fr); gap: 12px;">
            <div class="stat">
              <div class="stat-value" id="attempts">0</div>
              <div class="stat-label">Attempts</div>

    // ═══════════════════════════════════════════════════════════════════════
    // LOAD DATABASE
    // ═══════════════════════════════════════════════════════════════════════
    async function loadDailyDatabase(difficulty, forceClean = false) {
      const wrapper = document.getElementById('tree-scroll-wrapper');
      if (wrapper) wrapper.innerHTML = '<div class="loading">Loading classification database...</div>';
      
      try {
        const res = await fetch('phylosaur_db.json');
        if (!res.ok) throw new Error('Failed to load database');
        
        fullDatabase = await res.json();
        database = fullDatabase.filter(d => d.dificuldade === difficulty);
        
        console.log(`Loaded ${database.length} specimens for difficulty: ${difficulty}`);
        
        if (database.length === 0) {
          throw new Error(`No specimens found for difficulty: ${difficulty}`);
        }
        
        const seed = getDailySeed(difficulty);
        const hash = hashString(seed);
        const index = hash % database.length;
        
        targetDino = database[index];
        guesses = [];
        hintsRemaining = 3;
        isGiveUpMode = false;
        gameWon = false;
        guessedNames = new Set();
        revealedClades = new Set();
        hintHistory = [];
        guessesSinceLastHint = 0;
        
        console.log('Daily specimen:', targetDino.nome, 'Seed:', seed);
        
        const savedProgress = forceClean ? null : await loadGameProgress(difficulty);

        if (savedProgress && savedProgress.targetDino === targetDino.nome) {
          console.log('Loading saved progress...');
          
          // Reconstruir guesses
          if (savedProgress.guesses && savedProgress.guesses.length > 0) {
            guesses = savedProgress.guesses.map(savedGuess => {
              const dino = database.find(d => d.nome === savedGuess.nome);
              if (!dino) return null;
              
              const proximity = calculateProximity(dino, targetDino);
              
              if (proximity.lastCommonClade) {
                revealedClades.add(proximity.lastCommonClade);
              }
              
              return {
                dino: dino,
                proximity: proximity,
                isHint: savedGuess.isHint || false
              };
            }).filter(g => g !== null);
          }
          
          if (savedProgress.revealedClades) {
            savedProgress.revealedClades.forEach(c => revealedClades.add(c));
          }
          hintHistory = savedProgress.hintHistory || [];
          hintsRemaining = savedProgress.hintsRemaining !== undefined ? savedProgress.hintsRemaining : 3;
          guessedNames = new Set((savedProgress.guesses || []).map(g => g.nome.toLowerCase()));
          
          console.log(`Restored ${guesses.length} guesses, ${hintsRemaining} hints remaining`);
          
          setTimeout(() => {
            const bestMatch = guesses.length > 0 
              ? Math.max(...guesses.map(g => g.proximity.matches)) 
              : 0;
            
            document.getElementById('attempts').textContent = guesses.length;
            document.getElementById('hints').textContent = hintsRemaining;
            document.getElementById('best-match').textContent = bestMatch;
            document.getElementById('clades-revealed').textContent = revealedClades.size;
            
            renderEnhancedTree();
            updateCladeInfo();
            updateGuessHistory();
            document.getElementById('dino-input')?.focus();
          }, 100);
          
        } else {
          document.getElementById('attempts').textContent = '0';
          document.getElementById('hints').textContent = '3';
          document.getElementById('best-match').textContent = '0';
          document.getElementById('clades-revealed').textContent = '0';
          
          if (wrapper) {
            wrapper.innerHTML = '<div class="empty-state">The phylogenetic tree will progressively reveal as you explore the evolutionary landscape through your classification attempts.</div>';
          }
        }
        
        initializeAutocomplete();
        document.getElementById('dino-input')?.focus();

      } catch (err) {
        console.error('Database error:', err);
        if (wrapper) {
          wrapper.innerHTML = `<div class="empty-state" style="color:#c62828;"><strong>Error loading challenge</strong><br>${err.message}</div>`;
        }
      }
    }
    // ═══════════════════════════════════════════════════════════════════════
    // GAME LOGIC
    // ═══════════════════════════════════════════════════════════════════════
    function calculateProximity(guess, target) {
      let matches = 0;
      const minLength = Math.min(guess.linhagem.length, target.linhagem.length);
      
      for (let i = 0; i < minLength; i++) {
        if (guess.linhagem[i] === target.linhagem[i]) {
          matches++;
        } else {
          break;
        }
      }
      
      return {
        matches,
        percentage: Math.round((matches / target.linhagem.length) * 100),
        lastCommonClade: matches > 0 ? guess.linhagem[matches - 1] : null,
        divergenceDepth: matches
      };
    }

    function countPossibleSpecimens() {
        if (guesses.length === 0) return database.length;
        
        // Find the deepest revealed clade on the target's path
        const revealedOnPath = [];
        
        guesses.forEach(guess => {
            const mrca = findMRCA(guess.dino.linhagem, targetDino.linhagem);
            if (mrca) {
            const idx = targetDino.linhagem.indexOf(mrca.clade);
            targetDino.linhagem.slice(0, idx + 1).forEach(c => {
                if (!revealedOnPath.includes(c)) revealedOnPath.push(c);
            });
            }
        });

        revealedClades.forEach(clade => {
            const idx = targetDino.linhagem.indexOf(clade);
            if (idx !== -1) {
            targetDino.linhagem.slice(0, idx + 1).forEach(c => {
                if (!revealedOnPath.includes(c)) revealedOnPath.push(c);
            });
            }
        });

        if (revealedOnPath.length === 0) return database.length;

        // Count dinosaurs that have ALL revealed clades in their lineage
        return database.filter(d => 
            revealedOnPath.every(clade => d.linhagem.includes(clade))
        ).length;
        }

    async function makeGuess() {
      if (gameWon) return;
      
      const input = document.getElementById('dino-input');
      const guessName = input.value.trim();
      
      if (!guessName) {
        await customAlert('Input Required', 'Please enter a specimen name to classify.');
        return;
      }

      const guessDino = database.find(d => d.nome.toLowerCase() === guessName.toLowerCase());
      
      if (!guessDino) {
        await customAlert('Taxon Not Found', 'This specimen is not in the classification database. Please use the autocomplete suggestions.');
        return;
      }

      if (guessedNames.has(guessDino.nome.toLowerCase())) {
        await customAlert('Duplicate Classification', 'This specimen has already been classified in this session.');
        return;
      }
      
      guessedNames.add(guessDino.nome.toLowerCase());
      guessesSinceLastHint++; 

      const proximity = calculateProximity(guessDino, targetDino);
      
      if (proximity.lastCommonClade) {
        revealedClades.add(proximity.lastCommonClade);
      }
      
      guesses.push({ 
        dino: guessDino, 
        proximity, 
        isHint: false 
      });

      document.getElementById('attempts').textContent = guesses.length;
      document.getElementById('best-match').textContent = Math.max(...guesses.map(g => g.proximity.matches));
      document.getElementById('clades-revealed').textContent = revealedClades.size;
      document.getElementById('possible-specimens').textContent = countPossibleSpecimens();

      if (guessDino.nome === targetDino.nome) {
        gameWon = true;
        showVictory();
        input.value = '';
        document.getElementById('suggestions').style.display = 'none';
        return; 
      }
      renderEnhancedTree();
      updateCladeInfo();
      updateGuessHistory();

      input.value = '';
      document.getElementById('suggestions').style.display = 'none';

      if (currentUser && !gameWon && !isPracticeMode) {
        saveGameProgress(selectedDifficulty);
      }
    }

    async function useHint() {
      if (hintsRemaining <= 0) {
        await customAlert('No Hints Available', 'You have exhausted all hints for this challenge.');
        return;
      }
      
      if (gameWon) return;

        const requiredGuesses = 2;
        if (guessesSinceLastHint < requiredGuesses && guesses.length > 0) {
          await customAlert(
            'Hint Cooldown', 
            `You must make <strong>${requiredGuesses - guessesSinceLastHint}</strong> more classification attempt(s) before requesting another hint.`
          );
          return;
        }

      const dinosauriaIndex = targetDino.linhagem.indexOf('Dinosauria');
      let maxRevealedIndex = dinosauriaIndex;
      
      if (guesses.length > 0) {
        guesses.forEach(guess => {
          const guessDepth = guess.proximity.matches - 1;
          if (guessDepth > maxRevealedIndex) {
            maxRevealedIndex = guessDepth;
          }
        });
      }
      
      revealedClades.forEach(clade => {
        if (targetDino.linhagem.includes(clade)) {
          const cladeIndex = targetDino.linhagem.indexOf(clade);
          if (cladeIndex > maxRevealedIndex) {
            maxRevealedIndex = cladeIndex;
          }
        }
      });
      const nextCladeIndex = maxRevealedIndex + 1;
      if (nextCladeIndex >= targetDino.linhagem.length) {
        await customAlert('Lineage Complete', 'The complete phylogenetic path has been revealed. No additional hints available.');
        return;
      }

      hintsRemaining--;
      document.getElementById('hints').textContent = hintsRemaining;

      const revealClade = targetDino.linhagem[nextCladeIndex];
      
      await customAlert('Hint', `The next clade in the lineage is:<br><br><strong style="color:#d4b87e; font-size:1.2em;">${revealClade}</strong>`);

      revealedClades.add(revealClade);

      hintHistory.push({
        cladeName: revealClade,
        depth: nextCladeIndex + 1
      });
      
      document.getElementById('clades-revealed').textContent = revealedClades.size;
      document.getElementById('possible-specimens').textContent = countPossibleSpecimens();

      guessesSinceLastHint = 0;
      
      renderEnhancedTree();
      updateGuessHistory();
      await showCladeInfo(revealClade);

    if (currentUser && !isPracticeMode) {
    saveGameProgress(selectedDifficulty);
    }
  }

    // ═══════════════════════════════════════════════════════════════════════
    // TREE HELPERS
    // ═══════════════════════════════════════════════════════════════════════
    function findDinosauriaIndex(lineage) {
      return lineage.findIndex(c => c === 'Dinosauria');
    }
    
    function findMRCA(lineage1, lineage2) {
      const minLen = Math.min(lineage1.length, lineage2.length);
      let mrcaIndex = -1;
      
      for (let i = 0; i < minLen; i++) {
        if (lineage1[i] === lineage2[i]) {
          mrcaIndex = i;
        } else {
          break;
        }
      }
      
      return mrcaIndex >= 0 ? { clade: lineage1[mrcaIndex], index: mrcaIndex } : null;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // TREE RENDERING
    // ═══════════════════════════════════════════════════════════════════════
    function initTreePanning() {
      const container = document.getElementById('tree-container');
      if (!container) return;

      let isDown = false;
      let startX, startY, scrollLeft, scrollTop;

      container.addEventListener('mousedown', e => {
        if (e.target.closest('.tree-node-group, g')) return;
        isDown = true;
        startX = e.pageX - container.offsetLeft;
        startY = e.pageY - container.offsetTop;
        scrollLeft = container.scrollLeft;
        scrollTop  = container.scrollTop;
      });

      container.addEventListener('mouseleave', () => isDown = false);
      container.addEventListener('mouseup',    () => isDown = false);

      container.addEventListener('mousemove', e => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - container.offsetLeft;
        const y = e.pageY - container.offsetTop;
        container.scrollLeft = scrollLeft - (x - startX);
        container.scrollTop  = scrollTop  - (y - startY);
      });

      container.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
          startX = e.touches[0].pageX;
          startY = e.touches[0].pageY;
          scrollLeft = container.scrollLeft;
          scrollTop  = container.scrollTop;
        }
      }, { passive: true });

      container.addEventListener('touchmove', e => {
        if (e.touches.length !== 1) return;
        const x = e.touches[0].pageX;
        const y = e.touches[0].pageY;
        container.scrollLeft = scrollLeft - (x - startX);
        container.scrollTop  = scrollTop  - (y - startY);
      }, { passive: true });
    }

    function renderEnhancedTree() {
      const container = document.getElementById('tree-container');
      const wrapper   = document.getElementById('tree-scroll-wrapper');
      
      const nodeWidth  = 160;
      const nodeHeight = 45;
      const targetLineage = targetDino.linhagem;
      const dinoIndex     = findDinosauriaIndex(targetLineage);
      
      let deepestMRCA      = 'Dinosauria';
      let deepestMRCAIndex = dinoIndex;
      
      const guessData = guesses.map(guess => {
        const mrca = findMRCA(guess.dino.linhagem, targetLineage);
        return { 
          guess, 
          mrcaClade: mrca ? mrca.clade : 'Dinosauria', 
          mrcaIndex: mrca ? mrca.index : dinoIndex 
        };
      });
      
      guessData.forEach(d => {
        if (d.mrcaIndex > deepestMRCAIndex) {
          deepestMRCA = d.mrcaClade;
          deepestMRCAIndex = d.mrcaIndex;
        }
      });
      
      const guessGroupingClades = new Set();
      for (let i = 0; i < guesses.length; i++) {
        for (let j = i + 1; j < guesses.length; j++) {
          const mrca = findMRCA(guesses[i].dino.linhagem, guesses[j].dino.linhagem);
          if (mrca && mrca.clade !== 'Dinosauria') {
            guessGroupingClades.add(mrca.clade);
          }
        }
      }
      
      const showClades = new Set(['Dinosauria']);
      revealedClades.forEach(c => {
        if (targetLineage.includes(c)) {
          showClades.add(c);
        }
      });

      if (guesses.length > 0) {
        if (deepestMRCA !== 'Dinosauria') showClades.add(deepestMRCA);
        guessGroupingClades.forEach(c => showClades.add(c));
      }

      let changed = true;
      while (changed) {
        changed = false;
        const cur = Array.from(showClades);
        
        for (let i = 0; i < cur.length; i++) {
          for (let j = i + 1; j < cur.length; j++) {
            if (cur[i] === 'Dinosauria' || cur[j] === 'Dinosauria') continue;
            
            let lin1 = targetLineage.includes(cur[i]) 
              ? targetLineage 
              : guesses.find(g => g.dino.linhagem.includes(cur[i]))?.dino.linhagem;
            
            let lin2 = targetLineage.includes(cur[j]) 
              ? targetLineage 
              : guesses.find(g => g.dino.linhagem.includes(cur[j]))?.dino.linhagem;
            
            if (!lin1 || !lin2) continue;
            
            const idx1 = lin1.indexOf(cur[i]);
            const idx2 = lin2.indexOf(cur[j]);
            
            if ((lin2.includes(cur[i]) && lin2.indexOf(cur[i]) < idx2) ||
                (lin1.includes(cur[j]) && lin1.indexOf(cur[j]) < idx1)) {
              continue;
            }
            
            const mrca = findMRCA(lin1, lin2);
            if (mrca && mrca.clade !== 'Dinosauria' && !showClades.has(mrca.clade)) {
              showClades.add(mrca.clade);
              changed = true;
            }
          }
        }
      }
      
      // STEP 5 – build node map
      const nodes = new Map();
      nodes.set('Dinosauria', { 
        depth: 0, 
        children: [], 
        type: 'root', 
        lineageIndex: dinoIndex 
      });
      
      const cladeList = Array.from(showClades)
        .filter(c => c !== 'Dinosauria')
        .sort((a, b) => {
          let aI = -1, bI = -1;
          
          if (targetLineage.includes(a)) {
            aI = targetLineage.indexOf(a);
          } else {
            for (const g of guesses) {
              if (g.dino.linhagem.includes(a)) {
                aI = g.dino.linhagem.indexOf(a);
                break;
              }
            }
          }
          
          if (targetLineage.includes(b)) {
            bI = targetLineage.indexOf(b);
          } else {
            for (const g of guesses) {
              if (g.dino.linhagem.includes(b)) {
                bI = g.dino.linhagem.indexOf(b);
                break;
              }
            }
          }
          
          return aI - bI;
        });
      
      cladeList.forEach(clade => {
        let cladeLineage = null;
        let cladeIndex = -1;
        
        if (targetLineage.includes(clade)) {
          cladeLineage = targetLineage;
          cladeIndex = targetLineage.indexOf(clade);
        } else {
          for (const g of guesses) {
            if (g.dino.linhagem.includes(clade)) {
              cladeLineage = g.dino.linhagem;
              cladeIndex = g.dino.linhagem.indexOf(clade);
              break;
            }
          }
        }
        
        if (!cladeLineage) return;
        
        let parent = 'Dinosauria';
        for (let i = cladeIndex - 1; i >= dinoIndex; i--) {
          if (showClades.has(cladeLineage[i])) {
            parent = cladeLineage[i];
            break;
          }
        }
        
        if (!nodes.has(parent)) {
          console.warn('Parent not found:', parent);
          return;
        }
        
        nodes.set(clade, { 
          depth: 0, 
          children: [], 
          type: 'internal', 
          lineageIndex: cladeIndex 
        });
        
        if (!nodes.get(parent).children.includes(clade)) {
          nodes.get(parent).children.push(clade);
        }
      });
      
      (function recalcDepths(c, d) {
        nodes.get(c).depth = d;
        nodes.get(c).children.forEach(ch => recalcDepths(ch, d + 1));
      })('Dinosauria', 0);
      
    // STEP 6 – leaves
    const leaves = [];
    guesses.forEach((guess, idx) => {
    let attachTo = 'Dinosauria';
    for (let i = guess.dino.linhagem.length - 1; i >= 0; i--) {
        if (showClades.has(guess.dino.linhagem[i])) {
        attachTo = guess.dino.linhagem[i];
        break;
        }
    }
    
    const isWinningGuess = gameWon && !isGiveUpMode && guess.dino.nome === targetDino.nome;
    
    leaves.push({ 
        name: guess.dino.nome + '__leaf_' + idx, 
        displayName: guess.dino.nome, 
        parentNode: attachTo, 
        isTarget: isWinningGuess,
        isGiveUp: false,
        isHint: guess.isHint, 
        lineage: guess.dino.linhagem 
    });
    });

      // STEP 7 – mystery "?" (ou nome revelado se ganhou)

    if (!gameWon || isGiveUpMode) {
    let mysteryParent = 'Dinosauria';
    let maxDepthRevealed = -1;

    if (deepestMRCA !== 'Dinosauria') {
        const deepestMRCAIndex = targetLineage.indexOf(deepestMRCA);
        if (deepestMRCAIndex > maxDepthRevealed) {
        maxDepthRevealed = deepestMRCAIndex;
        mysteryParent = deepestMRCA;
        }
    }

    revealedClades.forEach(clade => {
        if (targetLineage.includes(clade)) {
        const cladeIndex = targetLineage.indexOf(clade);
        if (cladeIndex > maxDepthRevealed) {
            maxDepthRevealed = cladeIndex;
            mysteryParent = clade;
        }
        }
    });

    leaves.push({ 
        name: '?__leaf_target', 
        displayName: isGiveUpMode ? targetDino.nome : '?', 
        parentNode: mysteryParent, 
        isTarget: true,
        isGiveUp: isGiveUpMode,
        isHint: false, 
        lineage: targetLineage 
    });
    }
      
      const nodePositions = new Map();
      const leafPositions = new Map();
      const startY = 60;
      
      function countSlots(clade) {
        const nd = nodes.get(clade);
        if (!nd) return 1;
        
        const dl = leaves.filter(l => l.parentNode === clade).length;
        let cs = 0;
        nd.children.forEach(ch => { cs += countSlots(ch); });
        
        return Math.max(1, dl + cs);
      }
      
      const totalSlots = countSlots('Dinosauria');
      const dynH = Math.max(100, 200 - Math.max(0, (totalSlots - 3) * 8));
      const maxDepth = Math.max(...Array.from(nodes.values()).map(n => n.depth));
      const dynV = Math.max(80, Math.floor(120 * Math.max(0.7, 1 - (totalSlots - 15) * 0.02)));
      
      function positionNode(clade, left, right, depth) {
        const nd = nodes.get(clade);
        if (!nd) return;
        
        const y = startY + depth * dynV;
        const intChildren = nd.children.slice().sort((a, b) => 
          nodes.get(a).lineageIndex - nodes.get(b).lineageIndex
        );
        const dirLeaves = leaves.filter(l => l.parentNode === clade);
        
        const slots = [];
        intChildren.forEach(ch => slots.push({ 
          type: 'node', 
          name: ch, 
          slotCount: countSlots(ch) 
        }));
        dirLeaves.forEach(lf => slots.push({ 
          type: 'leaf', 
          name: lf.name, 
          slotCount: 1, 
          leaf: lf 
        }));
        
        const tot = slots.reduce((s, sl) => s + sl.slotCount, 0);
        const w = right - left;
        
        nodePositions.set(clade, { x: left + w / 2, y });
        
        let cur = left;
        slots.forEach(sl => {
          const sw = (sl.slotCount / tot) * w;
          if (sl.type === 'node') {
            positionNode(sl.name, cur, cur + sw, depth + 1);
          } else {
            leafPositions.set(sl.name, { 
              x: cur + sw / 2, 
              y: startY + (depth + 1) * dynV, 
              ...sl.leaf 
            });
          }
          cur += sw;
        });
      }
      
      positionNode('Dinosauria', 0, totalSlots * dynH, 0);
      const allX = [
        ...Array.from(leafPositions.values()).map(p => p.x), 
        ...Array.from(nodePositions.values()).map(p => p.x)
      ];
      const allY = [
        ...Array.from(leafPositions.values()).map(p => p.y), 
        ...Array.from(nodePositions.values()).map(p => p.y)
      ];
      
      if (!allX.length || !allY.length) {
        wrapper.innerHTML = '<div class="empty-state">No tree data.</div>';
        return;
      }
      
      const minX = Math.min(...allX);
      const maxX = Math.max(...allX);
      const maxY = Math.max(...allY);
      const pad = 80;
      const svgW = maxX - minX + pad * 2;
      const svgH = maxY + pad;
      
      let svg = wrapper.querySelector('#tree-svg');
      if (!svg) {
        wrapper.innerHTML = '<svg id="tree-svg"></svg>';
        svg = wrapper.querySelector('#tree-svg');
      }
      
      svg.setAttribute('viewBox', `${minX - pad} 0 ${svgW} ${svgH}`);
      svg.setAttribute('preserveAspectRatio', 'xMidYMin meet');
      svg.innerHTML = '';
      
      nodes.forEach((data, clade) => {
        const pos = nodePositions.get(clade);
        data.children.forEach(child => {
          const cp = nodePositions.get(child);
          if (!cp) return;
          
          const midY = (pos.y + nodeHeight / 2 + cp.y - nodeHeight / 2) / 2;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${pos.x} ${pos.y + nodeHeight / 2} C ${pos.x} ${midY}, ${cp.x} ${midY}, ${cp.x} ${cp.y - nodeHeight / 2}`);
          path.setAttribute('class', 'tree-line tree-line-revealed new-line');
          path.setAttribute('stroke', '#c9a96e');
          path.setAttribute('stroke-width', '3');
          path.setAttribute('fill', 'none');
          svg.appendChild(path);
        });
      });
      
      nodes.forEach((data, clade) => {
        const pos = nodePositions.get(clade);
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'tree-node-group new-node');
        g.style.cursor = 'pointer';
        g.onclick = () => showCladeInfo(clade);
        
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', pos.x - nodeWidth / 2);
        rect.setAttribute('y', pos.y - nodeHeight / 2);
        rect.setAttribute('width', nodeWidth);
        rect.setAttribute('height', nodeHeight);
        rect.setAttribute('rx', '6');
        const isHinted = hintHistory.some(h => h.cladeName === clade);
        rect.setAttribute('fill', isHinted ? '#6b4a8b' : '#8b4726');
        rect.setAttribute('stroke', isHinted ? '#a67cc9' : '#a6623d');
        rect.setAttribute('stroke', '#a6623d');
        rect.setAttribute('stroke-width', '2.5');
        g.appendChild(rect);
        
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', pos.x);
        label.setAttribute('y', pos.y);
        label.setAttribute('class', 'tree-node-label tree-node-label-ancestor');
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('dominant-baseline', 'middle');
        label.setAttribute('font-size', '15px');
        label.setAttribute('font-weight', '600');
        label.textContent = clade;
        g.appendChild(label);
        svg.appendChild(g);
      });
      
      leafPositions.forEach((leaf, name) => {
        const pp = nodePositions.get(leaf.parentNode);
        if (!pp) return;
        
        const midY = (pp.y + nodeHeight / 2 + leaf.y - nodeHeight / 2) / 2;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${pp.x} ${pp.y + nodeHeight / 2} C ${pp.x} ${midY}, ${leaf.x} ${midY}, ${leaf.x} ${leaf.y - nodeHeight / 2}`);
        path.setAttribute('class', leaf.isTarget 
          ? 'tree-line tree-line-revealed new-line' 
          : (leaf.isHint ? 'tree-line tree-line-hint new-line' : 'tree-line tree-line-guess new-line')
        );
        path.setAttribute('stroke-width', leaf.isTarget ? '3' : '2');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
      });
      
      leafPositions.forEach((leaf, name) => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'new-node');
        g.style.cursor = 'pointer';
        g.onclick = () => {
        if (leaf.displayName === '?') return;
        showCladeInfo(leaf.displayName);
        };
        
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', leaf.x - nodeWidth / 2);
        rect.setAttribute('y', leaf.y - nodeHeight / 2);
        rect.setAttribute('width', nodeWidth);
        rect.setAttribute('height', nodeHeight);
        rect.setAttribute('rx', '6');
        
        if (leaf.isTarget && !leaf.isGiveUp) {
        rect.setAttribute('fill', '#4a7c59');
        rect.setAttribute('stroke', '#5a9c6b');
        rect.setAttribute('stroke-width', '3');
        } else if (leaf.isTarget && leaf.isGiveUp) {
        rect.setAttribute('fill', '#8b3a2a');
        rect.setAttribute('stroke', '#c06040');
        rect.setAttribute('stroke-width', '3');
        } else if (leaf.isHint) {
        rect.setAttribute('fill', 'rgba(166,138,90,0.3)');
        rect.setAttribute('stroke', '#a68a5a');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('stroke-dasharray', '3,3');
        } else {
        rect.setAttribute('fill', 'rgba(255,255,255,0.1)');
        rect.setAttribute('stroke', '#8b6f47');
        rect.setAttribute('stroke-width', '2');
        rect.setAttribute('stroke-dasharray', '5,5');
        }
        g.appendChild(rect);
        
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', leaf.x);
        label.setAttribute('y', leaf.y);
        label.setAttribute('class', leaf.isTarget 
          ? 'tree-node-label tree-node-label-revealed' 
          : (leaf.isHint ? 'tree-node-label tree-node-label-hint' : 'tree-node-label tree-node-label-guess')
        );
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('dominant-baseline', 'middle');
        label.setAttribute('font-size', leaf.isTarget ? '20px' : '15px');
        label.setAttribute('font-weight', leaf.isTarget ? '700' : '500');
        label.setAttribute('font-style', 'italic'); 
        label.textContent = leaf.displayName;
        g.appendChild(label);
        svg.appendChild(g);
      });
      
      // Auto-scale
    requestAnimationFrame(() => {
    const svgB = svg.getBBox();
    const padding = 80;
    const naturalW = svgB.width + padding * 2;
    const naturalH = svgB.height + padding;
    const availW = container.getBoundingClientRect().width - 40;
    const isMobile = window.innerWidth <= 768;
    const shouldScale = naturalW <= availW * 1.2;

    if (shouldScale) {
      const scale = Math.min(1, availW / naturalW);
      svg.setAttribute('width', naturalW);
      svg.setAttribute('height', naturalH);
      wrapper.style.transform = `scale(${scale})`;
      wrapper.style.transformOrigin = 'top center';
      wrapper.style.width = '100%';
      wrapper.style.height = (naturalH * scale) + 'px';
      container.style.overflowX = 'hidden';
    } else {
      svg.setAttribute('width', naturalW);
      svg.setAttribute('height', naturalH);
      wrapper.style.transform = 'none';
      wrapper.style.width = naturalW + 'px';
      wrapper.style.height = naturalH + 'px';
      container.style.overflowX = 'auto';
    }
  });
    
      initTreePanning();
    }

    function shareResult() {
    const diffNames = {
        'muito_facil': 'Level I',
        'facil':       'Level II',
        'normal':      'Level III',
        'dificil':     'Level IV',
        'muito_dificil': 'Level V'
    };

    const blocks = guesses.map(g => {
        const pct = g.proximity.percentage;
        if (pct === 100)  return '🟩'; 
        if (pct >= 75)    return '🟨'; 
        if (pct >= 50)    return '🟧'; 
        if (pct >= 25)    return '🟥'; 
        return '⬛';                   
    });

    const rows = [];
    for (let i = 0; i < blocks.length; i += 8) {
        rows.push(blocks.slice(i, i + 8).join(''));
    }

    const today = getCurrentDateFormatted();
    const diff  = diffNames[selectedDifficulty] || '';
    const mode  = isPracticeMode ? ' (Practice)' : '';

    const text = [
        `Phylosaur — ${diff}${mode}`,
        `${today}`,
        ``,
        rows.join('\n'),
        ``,
        `${guesses.length} attempts • ${revealedClades.size} clades revealed`,
        ``,
        `https://rodrigosqrt3.github.io/Phylosaur/`
    ].join('\n');

    if (navigator.share) {
        navigator.share({ text }).catch(() => {});
    } else {
        navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('share-btn');
        if (!btn) return;
        const original = btn.textContent;
        btn.textContent = 'Copied to clipboard!';
        btn.disabled = true;
        setTimeout(() => {
            btn.textContent = original;
            btn.disabled = false;
        }, 2000);
        }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);

        const btn = document.getElementById('share-btn');
        if (btn) {
            btn.textContent = 'Copied!';
            btn.disabled = true;
            setTimeout(() => {
            btn.textContent = 'Share Result';
            btn.disabled = false;
            }, 2000);
        }
        });
    }
    }

    async function updateCladeInfo() {

      if (guesses.length === 0) {
        infoDiv.innerHTML = '';
        return;
      }

      const bestGuess = guesses.reduce((b, c) => 
        c.proximity.matches > b.proximity.matches ? c : b
      );
      
      const lastCommonClade = bestGuess.proximity.lastCommonClade;
      
      if (!lastCommonClade) {
        infoDiv.innerHTML = '';
        return;
      }

      infoDiv.innerHTML = `
        <div class="clade-info">
          <div class="loading">Retrieving phylogenetic information for ${lastCommonClade}…</div>
        </div>
      `;

      const wikiInfo = await fetchWikipediaInfo(lastCommonClade);
      
      if (!wikiInfo) {
        infoDiv.innerHTML = `
          <div class="clade-info">
            <h3>Most Recent Common Ancestor: ${lastCommonClade}</h3>
            <p style="color:#999;font-style:italic;">No encyclopedia entry found.</p>
          </div>
        `;
        return;
      }

      let html = `
        <div class="clade-info">
          <h3>Most Recent Common Ancestor: ${lastCommonClade}</h3>
          <div class="clade-content">
      `;
      
      if (wikiInfo.image) {
        html += `<img src="${wikiInfo.image}" alt="${wikiInfo.title}" class="clade-image" />`;
      }
      
      html += `
        <div class="clade-text">
          ${wikiInfo.description 
            ? `<p>${wikiInfo.description}</p>` 
            : '<p style="color:#999;font-style:italic;">Description unavailable.</p>'
          }
          <a href="${wikiInfo.url}" target="_blank" class="clade-link">View Encyclopedia Entry</a>
        </div>
      `;
      
      html += `</div>`;

      html += `<div class="phylo-path"><h4>Revealed Phylogenetic Path to Mystery Taxon:</h4>`;
      for (let i = 0; i < bestGuess.proximity.matches; i++) {
        html += `
          <div class="phylo-step">
            <span class="phylo-step-name">${targetDino.linhagem[i]}</span>
          </div>
        `;
      }
      html += `</div></div>`;
      
      infoDiv.innerHTML = html;
    }

    function showAbout() {
        setHeaderControls('about');
      const appContent = document.getElementById('app-content');
      
      appContent.innerHTML = `

        
        <div class="game-card" style="max-width: 900px; margin: 0 auto;">
          <h2 style="color:#d4b87e; margin-bottom:30px; text-align:center; font-size:2em; letter-spacing:3px;">
            About Phylosaur
          </h2>
          
          <div style="color:#f8f6f3; line-height:2; font-size:1.05em; text-align:justify;">

          <p style="margin-bottom:25px; font-style:italic; color:#a68a5a; font-size:0.95em;">
            The name Phylosaur draws from two roots: <em>phylo</em>, evoking both phylogenetics 
            and the Greek φιλέω, to love, and <em>saur</em>, from σαῦρος, the lizard suffix 
            ubiquitous in dinosaur nomenclature. A love of dinosaurs, systematically arranged, 
            even if dinosaurs were never truly lizards.
          </p>
            
            <p style="margin-bottom:25px;">
              Phylosaur is an interactive educational tool designed to familiarize users with the principles 
              of phylogenetic systematics through the lens of dinosaurian taxonomy. The game employs a 
              progressive tree-building mechanism wherein players deduce the systematic position of mystery 
              taxa by analyzing shared derived characteristics (synapomorphies) and identifying most recent 
              common ancestors within the cladistic framework.
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Phylogenetic Foundations
            </h3>

            <p style="margin-bottom:25px;">
              Modern biological classification rests upon phylogenetic systematics, a methodology that organizes 
              organisms according to their evolutionary relationships rather than superficial morphological 
              similarities. This approach, pioneered by Willi Hennig in the mid-twentieth century, recognizes 
              that meaningful taxonomic groupings (clades) must be monophyletic, comprising an ancestor and all 
              of its descendants. Each clade is diagnosed by the presence of synapomorphies, which are derived 
              character states inherited from a common ancestor and shared exclusively among its descendants.
            </p>

            <p style="margin-bottom:25px;">
              Within this framework, Dinosauria represents a well-supported clade united by numerous 
              osteological synapomorphies. The group is formally diagnosed by features including an open 
              acetabulum, elongated deltopectoral crest on the humerus, and modifications to the ankle joint 
              that facilitate a parasagittal gait. Dinosauria is subdivided into two primary clades: Saurischia, 
              characterized by a triradiate pelvis with the pubis directed anteroventrally, and Ornithischia, 
              distinguished by a retroversed pubis and predentary bone. Modern phylogenetic analyses place 
              Avialae (birds) within Saurischia as highly derived theropods, rendering traditional distinctions 
              between "dinosaurs" and "birds" paraphyletic and therefore scientifically obsolete.
            </p>

            <p style="margin-bottom:25px; padding:20px; background:rgba(61,47,31,0.3); border-left:4px solid #8b7355; font-style:italic;">
            "The combination of such characters... will, it is presumed, be deemed sufficient ground for establishing 
            a distinct tribe or sub-order of Saurian Reptiles, for which I would propose the name of <em>Dinosauria</em>."
            <span style="display:block; margin-top:10px; font-style:normal; font-size:0.9em; color:#a68a5a;">
                — Richard Owen (1842). Report on British Fossil Reptiles, Part II. <em>Report of the British Association 
                for the Advancement of Science</em>, 11: 60–204.
            </span>
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Game Mechanics and Educational Objectives
            </h3>

            <p style="margin-bottom:25px;">
              Players are presented with a mystery taxon and must infer its phylogenetic position through 
              iterative hypothesis testing. Each classification attempt reveals the deepest node shared between 
              the proposed taxon and the target, thereby progressively constraining the phylogenetic search 
              space. This mechanism mirrors the actual process of phylogenetic inference, wherein researchers 
              place unknown taxa by identifying their closest relatives through character analysis and cladistic 
              methodology.
            </p>

            <p style="margin-bottom:25px;">
            The game offers five difficulty tiers determined by taxonomic familiarity as measured through 
            Wikipedia pageview statistics over a thirty-day period. This metric serves as a proxy for public 
            recognition rather than phylogenetic complexity or fossil completeness. Higher difficulty levels 
            incorporate taxa with lower pageview counts (generally lesser-known genera that receive less popular 
            attention) thereby requiring broader taxonomic knowledge independent of their scientific importance 
            or systematic resolution. Daily challenges ensure that all participants worldwide confront identical 
            classification problems.
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Data Sources and Taxonomic Authority
            </h3>

            <p style="margin-bottom:25px;">
            Taxonomic occurrence data and genus-level diversity are sourced from the Paleobiology Database 
            (paleobiodb.org), an open-access repository of fossil taxa maintained by the international 
            paleontological community. The database is filtered to include only extinct, valid genera outside 
            crown Aves, removing modern birds and nomenclaturally problematic taxa. Phylogenetic lineages for 
            each genus are retrieved from Wikispecies (species.wikimedia.org), the free species directory, 
            via recursive parsing of its taxonomic template chain. Users should recognize that phylogenetic 
            hypotheses remain subject to revision as new fossil discoveries and analytical methods refine our 
            understanding of dinosaurian relationships. Certain taxa exhibiting nomenclatural ambiguities, 
            such as homonyms with non-paleontological entities, have been manually reviewed and remapped 
            to maintain database integrity.
            </p>

            <p style="margin-bottom:25px;">
            Difficulty classification methodology employs Wikipedia pageview metrics retrieved via the Wikimedia 
            REST API, aggregating thirty-day access statistics for each taxon. Genera are stratified into quintiles 
            based on these pageview counts, with the most frequently accessed taxa assigned to lower difficulty 
            tiers and obscure genera with minimal page traffic assigned to higher difficulty levels. This approach 
            acknowledges that taxonomic familiarity, operationalized here as public digital engagement—constitutes 
            a distinct dimension from phylogenetic complexity, fossil completeness, or systematic significance. 
            Consequently, scientifically important but publicly unfamiliar taxa may appear at higher difficulty 
            levels, while fragmentary or taxonomically problematic genera with substantial popular culture presence 
            may occupy lower tiers.
            </p>

            <p style="margin-bottom:25px;">
              Supplementary information regarding clade diagnoses and evolutionary context is retrieved from 
              Wikipedia's public API. While this resource provides accessible overviews suitable for educational 
              contexts, users are encouraged to consult primary literature (including original species descriptions, 
              phylogenetic analyses published in journals such as <em>Nature</em>, <em>Science</em>, <em>Journal 
              of Vertebrate Paleontology</em>, and <em>Cladistics</em>) for authoritative systematic information.
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Mathematical Foundations
            </h3>
            <p style="margin-bottom:25px;">
              The proximity measure computed by Phylosaur has a precise mathematical interpretation. 
              Given two taxa $A$ and $B$ with lineages $L_A$ and $L_B$ represented as 
              ordered sequences of clades from root to tip, the game computes the length of their 
              longest common prefix , equivalently, the depth of their most recent common ancestor 
              (MRCA). The phylogenetic distance between any two taxa is then formally defined as:
            </p>
            <p style="margin-bottom:25px; padding:20px; background:rgba(61,47,31,0.3); border-radius:4px; text-align:center;">
              $$d(A, B) = \\text{depth}(A) + \\text{depth}(B) - 2 \\cdot \\text{depth}(\\text{MRCA}(A, B))$$
            </p>
            <p style="margin-bottom:25px;">
              This quantity defines a tree metric, it is symmetric, non-negative, and satisfies 
              the triangle inequality $d(A,C) \\leq d(A,B) + d(B,C)$ for all taxa $A$, $B$, $C$. 
              Each guess therefore partitions the remaining hypothesis space: a guess sharing depth 
              $k$ with the target eliminates all taxa residing outside the clade diagnosed at that 
              depth, progressively constraining the search space in a manner analogous to binary 
              search on a sorted structure, though operating on a hierarchical tree topology rather 
              than a linear sequence.
            </p>
            <p style="margin-bottom:25px;">
              From an information-theoretic perspective, each guess constitutes a noisy query 
              revealing the depth of the MRCA between the queried taxon and the hidden target. 
              If we model the target as a uniformly distributed random variable over the 
              difficulty-stratified taxon set of size $n$, the expected number of guesses required 
              for identification scales with the entropy $H = \\log_2(n)$ of the prior 
              distribution. Hints function as direct entropy-reducing revelations, each disclosing 
              one additional node along the target lineage and thereby collapsing the hypothesis 
              space to the subtree rooted at the revealed clade. The constraint requiring two 
              intervening guesses between consecutive hints is designed to preserve the inferential 
              challenge by ensuring players actively engage with the phylogenetic structure rather 
              than exhausting hint allocations sequentially.
            </p>
            <p style="margin-bottom:25px;">
              Difficulty stratification employs a non-parametric quintile decomposition of the 
              Wikipedia pageview distribution. Formally, let $V = \\{v_1, v_2, \\ldots, v_m\\}$ 
              denote the sorted vector of thirty-day pageview counts across all $m$ taxa with 
              positive pageview values. The difficulty boundaries are defined at the 20th, 40th, 
              60th, and 80th percentiles of $V$, partitioning taxa into five equiprobable strata 
              under the empirical pageview distribution. Taxa with zero pageviews, those absent 
              from Wikipedia or generating no recorded traffic, are assigned to the highest 
              difficulty tier by default, as are genera whose names constitute homonyms with 
              non-paleontological entities, for which pageview counts would otherwise reflect 
              unrelated subject matter.
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Methodological Considerations and Limitations
            </h3>

            <p style="margin-bottom:25px;">
              Phylogenetic trees are hypotheses of evolutionary relationships, not immutable facts. The topology 
              presented here represents one interpretation of available data and may differ from alternative 
              analyses that employ different character matrices, taxon sampling strategies, or analytical methods. 
              Furthermore, phylogenetic resolution varies considerably across the dinosaurian tree; while some 
              clades such as Tyrannosauridae exhibit robust support across multiple independent analyses, others 
              remain poorly resolved due to incomplete fossil records or morphological conservatism. Users should 
              interpret tree topology with appropriate epistemic humility, recognizing that scientific understanding 
              of dinosaurian phylogeny continues to evolve.
            </p>

            <p style="margin-bottom:25px;">
              Taxonomic nomenclature follows standard conventions wherein genus names are italicized and capitalized, 
              while higher-level clade names are rendered in standard font with initial capitalization. Some taxa 
              included in the database may represent <em>nomina dubia</em> (names of doubtful validity based on 
              insufficient diagnostic material) or taxonomic wastebasket groups subject to ongoing systematic revision. 
            </p>

            <h3 style="color:#c9a96e; margin:35px 0 20px; font-size:1.4em; font-weight:400; letter-spacing:2px; border-bottom:2px solid #5d4a36; padding-bottom:12px;">
              Acknowledgments and Further Resources
            </h3>

            <p style="margin-bottom:25px;">
              This project acknowledges the foundational work of countless paleontologists whose systematic research 
              underlies our current understanding of dinosaurian phylogeny. For readers seeking deeper engagement 
              with the primary literature, recommended resources include the Paleobiology Database (paleobiodb.org), 
              which archives stratigraphic and taxonomic occurrence data; the Tree of Life Web Project (tolweb.org), 
              providing comprehensive phylogenetic overviews; and Fossilworks (fossilworks.org), which maintains 
              detailed taxonomic and bibliographic records. Users interested in formal training in phylogenetic 
              methodology are encouraged to consult <em>Phylogenetics: Theory and Practice of Phylogenetic Systematics</em> 
              by E.O. Wiley and Bruce Lieberman, or <em>Inferring Phylogenies</em> by Joseph Felsenstein.
            </p>

            <p style="margin-bottom:35px;">
              Phylosaur is provided as an educational resource without commercial intent. Users are encouraged to 
              provide feedback regarding taxonomic inaccuracies, interface improvements, or pedagogical suggestions 
              that might enhance the tool's effectiveness as an instructional aid. While this application aims for 
              scientific rigor, it should not be cited as a primary source in formal academic contexts; instead, 
              users should trace information to original systematic publications through the references provided in 
              supplementary materials.
            </p>

          </div>

          <p style="margin-bottom:35px; padding:20px; background:rgba(61,47,31,0.3); border-left:4px solid #8b7355; border-radius:2px;">
            Phylosaur is currently under active development. Taxonomic inaccuracies, interface issues, 
            missing genera, or any other problems are expected and your feedback is genuinely invaluable. 
            If you encounter anything worth reporting, however small, please write to 
            <a href="mailto:rodrigo03.villa@gmail.com" style="color:#c9a96e; text-decoration:none; border-bottom:1px solid #8b7355;">rodrigo03.villa@gmail.com</a>. 
            Every message is read and deeply appreciated.
          </p>

          <button class="btn-new-game" onclick="showDifficultySelection()" style="margin-top:30px;">
            Return to Challenge Selection
          </button>
        </div>
      `;
      setTimeout(() => {
        if (window.renderMathInElement) {
          renderMathInElement(document.querySelector('.game-card'), {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false }

            throwOnError: false
          });
        }
      }, 50);
    }

    function generateDifficultyStats(diffStats) {
      const diffNames = {
        'muito_facil': 'Level I',
        'facil': 'Level II',
        'normal': 'Level III',
        'dificil': 'Level IV',
        'muito_dificil': 'Level V'
      };

      if (!diffStats || diffStats.length === 0) {
        return '<p class="empty-stats">No classifications completed yet. Begin your research!</p>';
      }

      let html = '';
      diffStats.forEach(stat => {
        const winRate = stat.played > 0 ? Math.round((stat.won / stat.played) * 100) : 0;
        html += `
          <div class="difficulty-stat-row">
            <span class="diff-name">${diffNames[stat.difficulty] || stat.difficulty}</span>
            <div class="diff-stats">
              <span class="diff-record">${stat.won}/${stat.played}</span>
              <span class="diff-winrate">${winRate}%</span>
              <span class="diff-avg">Avg: ${Math.round(stat.avg_guesses)} guesses</span>
            </div>
          </div>
        `;
      });
      return html;
    }

    function generateRecentGames(recentGames) {
      if (!recentGames || recentGames.length === 0) {
        return '<p style="color:#8b7355; font-style:italic; padding:20px; text-align:center;">No recent classifications. Begin your research!</p>';
      }

      const diffNames = {
        'muito_facil': 'Level I',
        'facil': 'Level II',
        'normal': 'Level III',
        'dificil': 'Level IV',
        'muito_dificil': 'Level V'
      };

      const today = getTodayString();

      let html = '';
      recentGames.forEach(game => {
        const date = new Date(game.created_at).toLocaleDateString();
        
        const isToday = game.played_date === today;
        const spoiler = isToday && !game.won;
        const dinoDisplay = spoiler 
          ? '<span style="color:#5d4a36; font-style:italic;">[ classified today — hidden ]</span>' 
          : `<span style="color:#f8f6f3; font-style:italic;">${game.target_dino}</span>`;

        html += `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; margin:8px 0; background:rgba(42,31,22,0.4); border-left:4px solid ${game.won ? '#5a9c6b' : '#8b6f47'}; border-radius:4px;">
            <div style="flex:1;">
              <div style="display:flex; align-items:center; margin-bottom:5px;">
                <span style="color:${game.won ? '#c8e6c9' : '#d4a574'}; font-weight:700; margin-right:12px; font-size:1.1em;">${game.won ? '✓' : '…'}</span>
                ${dinoDisplay}
              </div>
            </div>
            <div style="text-align:right;">
              <div style="color:#c9a96e; font-size:1em; font-weight:600; margin-bottom:3px;">${game.guess_count} guesses</div>
              <div style="color:#8b7355; font-size:0.8em;">${diffNames[game.difficulty]} • ${date}</div>
            </div>
          </div>
        `;
      });
      return html;
    }

    function getDailySeed(difficulty) {
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      return `${dateStr}-${difficulty}`;
    }

    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        const char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
      }
      return Math.abs(hash);
    }
  </script>
</body>
